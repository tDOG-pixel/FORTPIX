<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BLOCK ROYALE - 8-Bit Battle Royale</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #111;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    font-family: 'Press Start 2P', monospace;
    color: #fff;
    overflow: hidden;
  }

  #game-container {
    position: relative;
    border: 4px solid #333;
    box-shadow: 0 0 30px rgba(0,0,0,0.8);
  }

  canvas {
    display: block;
    image-rendering: pixelated;
    image-rendering: crisp-edges;
  }

  #hud {
    position: absolute;
    top: 0; left: 0;
    width: 100%;
    pointer-events: none;
    display: flex;
    justify-content: space-between;
    padding: 10px;
  }

  .hud-left, .hud-right {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .hud-right { align-items: flex-end; }

  .stat-bar {
    font-size: 8px;
    line-height: 1.4;
    color: #fff;
    text-shadow: 2px 2px 0 #000;
  }

  #health-bar, #shield-bar {
    width: 120px;
    height: 10px;
    background: #400;
    border: 2px solid #000;
    margin-top: 2px;
  }

  #health-fill {
    height: 100%;
    background: #0f0;
    transition: width 0.2s;
  }

  #shield-fill {
    height: 100%;
    background: #0af;
    transition: width 0.2s;
  }

  #players-alive {
    font-size: 10px;
    text-shadow: 2px 2px 0 #000;
  }

  #kill-count {
    font-size: 8px;
    text-shadow: 2px 2px 0 #000;
  }

  #weapon-info {
    font-size: 8px;
    text-shadow: 2px 2px 0 #000;
    margin-top: 4px;
  }

  #minimap {
    position: absolute;
    bottom: 10px;
    right: 10px;
    border: 2px solid #000;
    background: #222;
    image-rendering: pixelated;
  }

  /* Title Screen */
  #title-screen {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: rgba(0,0,20,0.85);
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    z-index: 10;
  }

  #title-screen h1 {
    font-size: 28px;
    color: #6d4aff;
    text-shadow: 4px 4px 0 #000, 0 0 20px #6d4aff;
    margin-bottom: 10px;
    letter-spacing: 2px;
  }

  #title-screen p.subtitle {
    font-size: 10px;
    color: #ff0;
    margin-bottom: 30px;
    text-shadow: 2px 2px 0 #000;
  }

  #title-screen .controls {
    font-size: 8px;
    color: #aaa;
    margin-bottom: 30px;
    line-height: 2;
    text-align: center;
  }

  #start-btn {
    font-family: 'Press Start 2P', monospace;
    font-size: 14px;
    padding: 16px 32px;
    background: #6d4aff;
    color: #fff;
    border: 3px solid #fff;
    cursor: pointer;
    text-shadow: 2px 2px 0 #000;
    transition: transform 0.1s, background 0.1s;
  }

  #start-btn:hover {
    background: #8a5fff;
    transform: scale(1.05);
  }

  #start-btn:active {
    transform: scale(0.98);
  }

  /* Game Over Screen */
  #gameover-screen {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: rgba(0,0,0,0.85);
    display: none;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    z-index: 10;
  }

  #gameover-screen h2 {
    font-size: 20px;
    margin-bottom: 20px;
    text-shadow: 3px 3px 0 #000;
  }

  #gameover-screen p {
    font-size: 10px;
    margin-bottom: 20px;
    color: #aaa;
  }

  #restart-btn {
    font-family: 'Press Start 2P', monospace;
    font-size: 12px;
    padding: 12px 24px;
    background: #d33;
    color: #fff;
    border: 3px solid #fff;
    cursor: pointer;
  }

  #restart-btn:hover { background: #f44; }
</style>
</head>
<body>

<div id="game-container">
  <canvas id="game" width="640" height="480"></canvas>

  <div id="hud">
    <div class="hud-left">
      <div class="stat-bar">HP</div>
      <div id="health-bar"><div id="health-fill" style="width:100%"></div></div>
      <div class="stat-bar" style="margin-top:4px;">SHIELD</div>
      <div id="shield-bar"><div id="shield-fill" style="width:0%"></div></div>
    </div>
    <div class="hud-right">
      <div id="players-alive">ALIVE: 50</div>
      <div id="kill-count">KILLS: 0</div>
      <div id="weapon-info">FISTS</div>
    </div>
  </div>

  <canvas id="minimap" width="100" height="100"></canvas>

  <div id="title-screen">
    <h1>BLOCK ROYALE</h1>
    <p class="subtitle">~ 8-Bit Battle Royale ~</p>
    <div class="controls">
      WASD / ARROWS — Move<br>
      MOUSE — Aim<br>
      LEFT CLICK — Shoot<br>
      SHIFT — Sprint<br>
      E — Pick Up Loot
    </div>
    <button id="start-btn">DROP IN!</button>
  </div>

  <div id="gameover-screen">
    <h2 id="gameover-title">VICTORY ROYALE!</h2>
    <p id="gameover-stats"></p>
    <button id="restart-btn">PLAY AGAIN</button>
  </div>
</div>

<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const minimapCanvas = document.getElementById('minimap');
const mctx = minimapCanvas.getContext('2d');
ctx.imageSmoothingEnabled = false;

const TILE = 16;
const MAP_W = 80; // tiles
const MAP_H = 60;
const WORLD_W = MAP_W * TILE;
const WORLD_H = MAP_H * TILE;

// ===== TILE TYPES =====
const GRASS = 0, TREE = 1, WATER = 2, HOUSE = 3, ROAD = 4, MOUNTAIN = 5, SAND = 6;

let tileMap = [];
let lootSpawns = [];

// ===== WEAPONS =====
const WEAPONS = {
  pistol:   { name: 'PISTOL',   damage: 18, fireRate: 400, spread: 0.08, bullets: 1, speed: 8, range: 200, rarity: 0 },
  smg:      { name: 'SMG',      damage: 12, fireRate: 90,  spread: 0.12, bullets: 1, speed: 9, range: 180, rarity: 1 },
  shotgun:  { name: 'SHOTGUN',  damage: 70, fireRate: 700, spread: 0.25, bullets: 5, speed: 7, range: 120, rarity: 1 },
  rifle:    { name: 'RIFLE',    damage: 30, fireRate: 200, spread: 0.04, bullets: 1, speed: 11, range: 280, rarity: 2 },
  sniper:   { name: 'SNIPER',   damage: 100,fireRate: 1200,spread: 0.01, bullets: 1, speed: 16, range: 500, rarity: 3 },
};

const RARITY_COLORS = ['#999', '#4f4', '#48f', '#c4f'];
const RARITY_NAMES = ['Common','Uncommon','Rare','Epic'];

// ===== GAME STATE =====
let gameState = 'title'; // title, playing, gameover
let player = null;
let bots = [];
let bullets = [];
let loots = [];
let particles = [];
let killFeed = [];

let camera = { x: 0, y: 0 };
let keys = {};
let mouseX = 0, mouseY = 0;
let mouseDown = false;

let totalPlayers = 30;
let aliveCount = 30;
let kills = 0;

// Storm
let storm = { x: WORLD_W/2, y: WORLD_H/2, radius: WORLD_W * 0.55, targetRadius: WORLD_W * 0.55, phase: 0, timer: 15000, shrinkTime: 12000, waitTime: 20000, shrinking: false };

// ===== MAP GENERATION =====
function generateMap() {
  tileMap = [];
  lootSpawns = [];
  for (let y = 0; y < MAP_H; y++) {
    let row = [];
    for (let x = 0; x < MAP_W; x++) {
      let t = GRASS;
      let n = noise(x * 0.08, y * 0.08);
      let n2 = noise(x * 0.03 + 100, y * 0.03 + 100);

      if (n2 < 0.25) t = WATER;
      else if (n2 < 0.3) t = SAND;
      else if (n > 0.65) t = MOUNTAIN;

      // Roads
      if (x === MAP_W/2 || y === MAP_H/2) t = ROAD;
      if ((x === Math.floor(MAP_W/4) || x === Math.floor(MAP_W*3/4)) && y > 5 && y < MAP_H-5) t = ROAD;
      if ((y === Math.floor(MAP_H/4) || y === Math.floor(MAP_H*3/4)) && x > 5 && x < MAP_W-5) t = ROAD;

      // Trees scattered
      if (t === GRASS && Math.random() < 0.06) {
        t = TREE;
      }

      // Houses near road intersections
      if (t === GRASS && Math.random() < 0.012) {
        t = HOUSE;
        lootSpawns.push({x: x*TILE + TILE/2, y: y*TILE + TILE/2});
      }

      row.push(t);
    }
    tileMap.push(row);
  }
}

function noise(x, y) {
  return (Math.sin(x * 2.3 + y * 1.7) * Math.cos(x * 1.1 - y * 2.7) * 0.5 + 0.5);
}

function getTile(tx, ty) {
  if (tx < 0 || ty < 0 || tx >= MAP_W || ty >= MAP_H) return WATER;
  return tileMap[ty][tx];
}

function isSolid(tx, ty) {
  let t = getTile(tx, ty);
  return t === WATER || t === MOUNTAIN || t === TREE || t === HOUSE;
}

function isBlocking(px, py) {
  let tx = Math.floor(px / TILE);
  let ty = Math.floor(py / TILE);
  return isSolid(tx, ty);
}

// ===== ENTITY BASE =====
class Entity {
  constructor(x, y, team, isPlayer = false) {
    this.x = x;
    this.y = y;
    this.vx = 0;
    this.vy = 0;
    this.angle = 0;
    this.health = 100;
    this.maxHealth = 100;
    this.shield = 0;
    this.maxShield = 100;
    this.team = team;
    this.isPlayer = isPlayer;
    this.radius = 6;
    this.speed = 1.4;
    this.weapon = null;
    this.lastShot = 0;
    this.alive = true;
    this.sprinting = false;
    this.color = isPlayer ? '#6d4aff' : '#' + Math.floor(Math.random()*16777215).toString(16).padStart(6,'0');
    this.kills = 0;
    this.botTarget = null;
    this.botRetargetTimer = 0;
    this.botShootTimer = 0;
    this.botMoveTimer = 0;
    this.botMoveAngle = Math.random() * Math.PI * 2;
    this.damageFlash = 0;
  }

  takeDamage(amount, fromTeam) {
    if (!this.alive) return;
    let dmg = amount;
    if (this.shield > 0) {
      let absorbed = Math.min(this.shield, dmg);
      this.shield -= absorbed;
      dmg -= absorbed;
    }
    this.health -= dmg;
    this.damageFlash = 8;
    if (this.health <= 0) {
      this.die();
      return true;
    }
    return false;
  }

  die() {
    this.alive = false;
    aliveCount--;
    // Drop loot
    if (this.weapon) {
      spawnLoot(this.x, this.y, this.weapon);
    }
    if (this.shield > 0 || Math.random() < 0.5) {
      spawnLoot(this.x + (Math.random()-0.5)*10, this.y + (Math.random()-0.5)*10, 'shield_potion');
    }
    if (Math.random() < 0.4) {
      spawnLoot(this.x + (Math.random()-0.5)*10, this.y + (Math.random()-0.5)*10, 'bandage');
    }
    // Death particles
    for (let i = 0; i < 12; i++) {
      particles.push({
        x: this.x, y: this.y,
        vx: Math.cos(i/12*Math.PI*2) * (1+Math.random()*2),
        vy: Math.sin(i/12*Math.PI*2) * (1+Math.random()*2),
        life: 30, maxLife: 30, color: this.color, size: 3
      });
    }
  }

  shoot() {
    if (!this.weapon || !this.alive) return;
    let now = Date.now();
    let w = WEAPONS[this.weapon];
    if (now - this.lastShot < w.fireRate) return;
    this.lastShot = now;

    for (let i = 0; i < w.bullets; i++) {
      let spread = (Math.random() - 0.5) * w.spread * 2;
      let ang = this.angle + spread;
      bullets.push({
        x: this.x + Math.cos(this.angle) * 8,
        y: this.y + Math.sin(this.angle) * 8,
        vx: Math.cos(ang) * w.speed,
        vy: Math.sin(ang) * w.speed,
        damage: w.damage,
        team: this.team,
        life: w.range / w.speed,
        color: this.isPlayer ? '#ff0' : '#f44'
      });
    }
  }

  update(dt) {
    if (!this.alive) return;
    if (this.damageFlash > 0) this.damageFlash--;

    // Movement
    let mx = this.vx, my = this.vy;
    if (this.sprinting) { mx *= 1.6; my *= 1.6; }
    let nx = this.x + mx;
    let ny = this.y + my;

    if (!isBlocking(nx, this.y)) this.x = nx;
    if (!isBlocking(this.x, ny)) this.y = ny;

    // Keep in bounds
    this.x = Math.max(8, Math.min(WORLD_W - 8, this.x));
    this.y = Math.max(8, Math.min(WORLD_H - 8, this.y));

    // Storm damage
    let dx = this.x - storm.x;
    let dy = this.y - storm.y;
    let dist = Math.sqrt(dx*dx + dy*dy);
    if (dist > storm.radius) {
      this.takeDamage(0.5, -1);
    }

    this.vx *= 0.7;
    this.vy *= 0.7;
  }
}

// ===== BOT AI =====
function updateBot(bot, dt) {
  if (!bot.alive) return;

  bot.botRetargetTimer -= dt;
  bot.botShootTimer -= dt;
  bot.botMoveTimer -= dt;

  // Find nearest enemy
  if (bot.botRetargetTimer <= 0 || !bot.botTarget || !bot.botTarget.alive) {
    bot.botRetargetTimer = 1000 + Math.random() * 1500;
    let nearest = null;
    let nearestDist = 600;
    let candidates = [player, ...bots];
    for (let e of candidates) {
      if (!e || !e.alive || e.team === bot.team || e === bot) continue;
      let d = Math.hypot(e.x - bot.x, e.y - bot.y);
      if (d < nearestDist) {
        nearestDist = d;
        nearest = e;
      }
    }
    bot.botTarget = nearest;
  }

  // Move toward or away from target
  let targetSpeed = bot.speed;
  if (bot.botTarget && bot.botTarget.alive) {
    let dx = bot.botTarget.x - bot.x;
    let dy = bot.botTarget.y - bot.y;
    let dist = Math.hypot(dx, dy);

    bot.angle = Math.atan2(dy, dx);

    if (dist > 150) {
      // Move toward
      bot.vx += Math.cos(bot.angle) * 0.15;
      bot.vy += Math.sin(bot.angle) * 0.15;
    } else if (dist < 80) {
      // Move away a bit / strafe
      let strafeAngle = bot.angle + Math.PI/2 + (Math.random() < 0.5 ? 0 : Math.PI);
      bot.vx += Math.cos(strafeAngle) * 0.1 + Math.cos(bot.angle + Math.PI) * 0.05;
      bot.vy += Math.sin(strafeAngle) * 0.1 + Math.sin(bot.angle + Math.PI) * 0.05;
    } else {
      // Strafe
      let strafeAngle = bot.angle + Math.PI/2 + (Math.random() < 0.5 ? 0 : Math.PI);
      bot.vx += Math.cos(strafeAngle) * 0.1;
      bot.vy += Math.sin(strafeAngle) * 0.1;
    }

    // Shoot
    if (bot.weapon && bot.botShootTimer <= 0 && dist < 300 && hasLineOfSight(bot, bot.botTarget)) {
      bot.shoot();
      bot.botShootTimer = 300 + Math.random() * 600;
    }
  } else {
    // Wander
    if (bot.botMoveTimer <= 0) {
      bot.botMoveTimer = 1500 + Math.random() * 2000;
      bot.botMoveAngle = Math.random() * Math.PI * 2;
    }
    // Also move toward storm center if outside
    let sdx = storm.x - bot.x;
    let sdy = storm.y - bot.y;
    let sdist = Math.hypot(sdx, sdy);
    if (sdist > storm.radius * 0.8) {
      bot.botMoveAngle = Math.atan2(sdy, sdx);
    }
    bot.vx += Math.cos(bot.botMoveAngle) * 0.12;
    bot.vy += Math.sin(bot.botMoveAngle) * 0.12;
    bot.angle = bot.botMoveAngle;
  }

  // Pick up nearby loot
  for (let l of loots) {
    if (!l.taken && Math.hypot(l.x - bot.x, l.y - bot.y) < 12) {
      if (l.type !== 'bandage' && l.type !== 'shield_potion') {
        if (!bot.weapon || WEAPONS[l.type].rarity > WEAPONS[bot.weapon].rarity) {
          bot.weapon = l.type;
          l.taken = true;
        }
      } else {
        if (l.type === 'shield_potion' && bot.shield < 50) { bot.shield = Math.min(bot.maxShield, bot.shield + 50); l.taken = true; }
        if (l.type === 'bandage' && bot.health < 75) { bot.health = Math.min(75, bot.health + 25); l.taken = true; }
      }
    }
  }

  bot.update(dt);
}

function hasLineOfSight(a, b) {
  let steps = 20;
  for (let i = 1; i < steps; i++) {
    let px = a.x + (b.x - a.x) * (i/steps);
    let py = a.y + (b.y - a.y) * (i/steps);
    if (isBlocking(px, py)) return false;
  }
  return true;
}

// ===== LOOT =====
function spawnLoot(x, y, type) {
  loots.push({ x, y, type, taken: false, bobOffset: Math.random() * Math.PI * 2 });
}

function scatterLoot() {
  // Scatter loot around the map
  for (let i = 0; i < 60; i++) {
    let attempts = 20;
    while (attempts-- > 0) {
      let x = Math.random() * WORLD_W;
      let y = Math.random() * WORLD_H;
      if (!isBlocking(x, y)) {
        let weaponKeys = Object.keys(WEAPONS);
        let wk = weaponKeys[Math.floor(Math.random() * weaponKeys.length)];
        spawnLoot(x, y, wk);
        break;
      }
    }
  }
  // Shield potions and bandages
  for (let i = 0; i < 30; i++) {
    let attempts = 20;
    while (attempts-- > 0) {
      let x = Math.random() * WORLD_W;
      let y = Math.random() * WORLD_H;
      if (!isBlocking(x, y)) {
        spawnLoot(x, y, Math.random() < 0.5 ? 'shield_potion' : 'bandage');
        break;
      }
    }
  }
  // Loot at house spawns
  for (let s of lootSpawns) {
    let weaponKeys = Object.keys(WEAPONS);
    let wk = weaponKeys[Math.floor(Math.random() * weaponKeys.length)];
    spawnLoot(s.x, s.y, wk);
    if (Math.random() < 0.6) spawnLoot(s.x + 10, s.y, Math.random() < 0.5 ? 'shield_potion' : 'bandage');
  }
}

// ===== DRAWING =====
function drawTile(tile, x, y) {
  switch (tile) {
    case GRASS:
      ctx.fillStyle = '#2d5';
      ctx.fillRect(x, y, TILE, TILE);
      ctx.fillStyle = '#4d8';
      ctx.fillRect(x + 2, y + 2, 3, 3);
      ctx.fillRect(x + 8, y + 10, 2, 2);
      break;
    case TREE:
      ctx.fillStyle = '#2d5';
      ctx.fillRect(x, y, TILE, TILE);
      ctx.fillStyle = '#360';
      ctx.fillRect(x + 6, y + 8, 4, 8);
      ctx.fillStyle = '#080';
      ctx.beginPath();
      ctx.arc(x + 8, y + 6, 6, 0, Math.PI * 2);
      ctx.fill();
      break;
    case WATER:
      ctx.fillStyle = '#26a';
      ctx.fillRect(x, y, TILE, TILE);
      ctx.fillStyle = '#37b';
      ctx.fillRect(x + 3, y + 5, 4, 2);
      ctx.fillRect(x + 9, y + 11, 3, 1);
      break;
    case HOUSE:
      ctx.fillStyle = '#975';
      ctx.fillRect(x, y, TILE, TILE);
      ctx.fillStyle = '#c42';
      ctx.fillRect(x + 2, y, 12, 7);
      ctx.fillStyle = '#753';
      ctx.fillRect(x + 5, y + 9, 6, 7);
      break;
    case ROAD:
      ctx.fillStyle = '#555';
      ctx.fillRect(x, y, TILE, TILE);
      ctx.fillStyle = '#777';
      ctx.fillRect(x, y, TILE, 1);
      break;
    case MOUNTAIN:
      ctx.fillStyle = '#666';
      ctx.fillRect(x, y, TILE, TILE);
      ctx.fillStyle = '#888';
      ctx.fillRect(x + 4, y + 2, 8, 4);
      ctx.fillStyle = '#aaa';
      ctx.fillRect(x + 6, y + 1, 4, 2);
      break;
    case SAND:
      ctx.fillStyle = '#ed5';
      ctx.fillRect(x, y, TILE, TILE);
      ctx.fillStyle = '#fd6';
      ctx.fillRect(x + 4, y + 3, 2, 2);
      ctx.fillRect(x + 10, y + 9, 2, 2);
      break;
  }
}

function drawEntity(e) {
  if (!e.alive) return;

  let sx = Math.round(e.x - camera.x);
  let sy = Math.round(e.y - camera.y);

  if (sx < -20 || sx > canvas.width + 20 || sy < -20 || sy > canvas.height + 20) return;

  // Shadow
  ctx.fillStyle = 'rgba(0,0,0,0.3)';
  ctx.beginPath();
  ctx.ellipse(sx, sy + 6, 7, 3, 0, 0, Math.PI * 2);
  ctx.fill();

  // Body
  ctx.fillStyle = e.damageFlash > 0 ? '#fff' : e.color;
  ctx.fillRect(sx - 5, sy - 4, 10, 12);

  // Head
  ctx.fillStyle = e.damageFlash > 0 ? '#fff' : '#fcb';
  ctx.fillRect(sx - 4, sy - 10, 8, 7);

  // Eyes
  ctx.fillStyle = '#000';
  ctx.fillRect(sx - 3, sy - 8, 2, 2);
  ctx.fillRect(sx + 1, sy - 8, 2, 2);

  // Weapon direction indicator
  if (e.weapon) {
    ctx.strokeStyle = '#ccc';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(sx, sy);
    ctx.lineTo(sx + Math.cos(e.angle) * 12, sy + Math.sin(e.angle) * 12);
    ctx.stroke();
  } else {
    // Fist
    ctx.strokeStyle = '#fcb';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(sx, sy);
    ctx.lineTo(sx + Math.cos(e.angle) * 10, sy + Math.sin(e.angle) * 10);
    ctx.stroke();
  }

  // Health bar above bots
  if (!e.isPlayer && e.health < e.maxHealth) {
    ctx.fillStyle = '#000';
    ctx.fillRect(sx - 10, sy - 16, 20, 4);
    ctx.fillStyle = '#0f0';
    ctx.fillRect(sx - 9, sy - 15, 18 * (e.health / e.maxHealth), 2);
    if (e.shield > 0) {
      ctx.fillStyle = '#0af';
      ctx.fillRect(sx - 9, sy - 17, 18 * (e.shield / e.maxShield), 1);
    }
  }
}

function drawBullet(b) {
  let sx = b.x - camera.x;
  let sy = b.y - camera.y;
  ctx.fillStyle = b.color;
  ctx.fillRect(sx - 2, sy - 2, 4, 4);
  // Trail
  ctx.fillStyle = b.color + '55';
  ctx.fillRect(sx - b.vx - 2, sy - b.vy - 2, 4, 4);
}

function drawLoot(l) {
  if (l.taken) return;
  let sx = l.x - camera.x;
  let sy = l.y - camera.y;
  if (sx < -20 || sx > canvas.width + 20 || sy < -20 || sy > canvas.height + 20) return;

  let bob = Math.sin(Date.now() / 300 + l.bobOffset) * 2;

  let color = '#ff0';
  let label = '?';

  if (l.type in WEAPONS) {
    let r = WEAPONS[l.type].rarity;
    color = RARITY_COLORS[r];
    label = 'G';
  } else if (l.type === 'shield_potion') {
    color = '#0af'; label = 'S';
  } else if (l.type === 'bandage') {
    color = '#f44'; label = 'B';
  }

  // Glow
  ctx.fillStyle = color + '22';
  ctx.beginPath();
  ctx.arc(sx, sy + bob, 12, 0, Math.PI * 2);
  ctx.fill();

  // Box
  ctx.fillStyle = '#000';
  ctx.fillRect(sx - 6, sy - 6 + bob, 12, 12);
  ctx.fillStyle = color;
  ctx.fillRect(sx - 5, sy - 5 + bob, 10, 10);
  ctx.fillStyle = '#fff';
  ctx.font = '8px monospace';
  ctx.textAlign = 'center';
  ctx.fillText(label, sx, sy + 3 + bob);
}

function drawStorm() {
  // Draw storm circle overlay
  let cx = storm.x - camera.x;
  let cy = storm.y - camera.y;

  ctx.save();
  ctx.globalCompositeOperation = 'source-over';

  // Fill outside circle with purple-ish
  ctx.fillStyle = 'rgba(140, 60, 220, 0.25)';
  ctx.beginPath();
  ctx.rect(0, 0, canvas.width, canvas.height);
  ctx.arc(cx, cy, storm.radius, 0, Math.PI * 2, true);
  ctx.fill();

  // Storm wall ring
  ctx.strokeStyle = 'rgba(180, 100, 255, 0.6)';
  ctx.lineWidth = 4;
  ctx.beginPath();
  ctx.arc(cx, cy, storm.radius, 0, Math.PI * 2);
  ctx.stroke();

  // Target circle (next zone)
  if (storm.shrinking) {
    ctx.strokeStyle = 'rgba(255, 255, 255, 0.4)';
    ctx.lineWidth = 2;
    ctx.setLineDash([4, 4]);
    ctx.beginPath();
    ctx.arc(cx, cy, storm.targetRadius, 0, Math.PI * 2);
    ctx.stroke();
    ctx.setLineDash([]);
  }

  ctx.restore();
}

function drawParticles() {
  for (let p of particles) {
    let sx = p.x - camera.x;
    let sy = p.y - camera.y;
    ctx.globalAlpha = p.life / p.maxLife;
    ctx.fillStyle = p.color;
    ctx.fillRect(sx - p.size/2, sy - p.size/2, p.size, p.size);
  }
  ctx.globalAlpha = 1;
}

function drawMinimap() {
  mctx.clearRect(0, 0, 100, 100);
  mctx.fillStyle = '#222';
  mctx.fillRect(0, 0, 100, 100);

  // Tiles simplified
  for (let y = 0; y < MAP_H; y += 2) {
    for (let x = 0; x < MAP_W; x += 2) {
      let t = tileMap[y][x];
      let c = '#2d5';
      if (t === WATER) c = '#26a';
      if (t === TREE) c = '#080';
      if (t === MOUNTAIN) c = '#666';
      if (t === ROAD) c = '#555';
      if (t === SAND) c = '#ed5';
      if (t === HOUSE) c = '#c42';
      mctx.fillStyle = c;
      mctx.fillRect(x/2, y/2, 1, 1);
    }
  }

  // Storm
  mctx.strokeStyle = 'rgba(180,100,255,0.8)';
  mctx.lineWidth = 1;
  mctx.beginPath();
  mctx.arc(storm.x / (WORLD_W/100), storm.y / (WORLD_H/100), storm.radius / (WORLD_W/100), 0, Math.PI*2);
  mctx.stroke();

  // Bots as red dots
  for (let b of bots) {
    if (!b.alive) continue;
    let mx = b.x / (WORLD_W/100);
    let my = b.y / (WORLD_H/100);
    mctx.fillStyle = '#f44';
    mctx.fillRect(mx - 1, my - 1, 2, 2);
  }

  // Player as white dot
  if (player && player.alive) {
    let mx = player.x / (WORLD_W/100);
    let my = player.y / (WORLD_H/100);
    mctx.fillStyle = '#fff';
    mctx.fillRect(mx - 1, my - 1, 3, 3);
  }
}

// ===== UPDATE LOOP =====
let lastTime = 0;

function update(dt) {
  if (gameState !== 'playing') return;

  // --- Player Input ---
  if (player.alive) {
    let mx = 0, my = 0;
    if (keys['w'] || keys['arrowup']) my -= 1;
    if (keys['s'] || keys['arrowdown']) my += 1;
    if (keys['a'] || keys['arrowleft']) mx -= 1;
    if (keys['d'] || keys['arrowright']) mx += 1;

    let len = Math.hypot(mx, my);
    if (len > 0) {
      mx /= len; my /= len;
      player.sprinting = !!keys['shift'];
      player.vx += mx * 0.2;
      player.vy += my * 0.2;
    } else {
      player.sprinting = false;
    }

    // Aim at mouse
    let wx = mouseX + camera.x;
    let wy = mouseY + camera.y;
    player.angle = Math.atan2(wy - player.y, wx - player.x);

    // Shoot
    if (mouseDown && player.weapon) {
      player.shoot();
    }

    // Pick up loot
    if (keys['e']) {
      for (let l of loots) {
        if (!l.taken && Math.hypot(l.x - player.x, l.y - player.y) < 14) {
          if (l.type in WEAPONS) {
            if (!player.weapon || WEAPONS[l.type].rarity > WEAPONS[player.weapon].rarity || player.weapon === l.type) {
              player.weapon = l.type;
              l.taken = true;
            }
          } else if (l.type === 'shield_potion') {
            if (player.shield < player.maxShield) {
              player.shield = Math.min(player.maxShield, player.shield + 50);
              l.taken = true;
            }
          } else if (l.type === 'bandage') {
            if (player.health < 100) {
              player.health = Math.min(100, player.health + 25);
              l.taken = true;
            }
          }
        }
      }
    }
  }

  player.update(dt);

  // --- Bots ---
  for (let b of bots) {
    updateBot(b, dt);
  }

  // --- Bullets ---
  for (let i = bullets.length - 1; i >= 0; i--) {
    let b = bullets[i];
    b.x += b.vx;
    b.y += b.vy;
    b.life--;

    // Wall collision
    if (isBlocking(b.x, b.y)) {
      bullets.splice(i, 1);
      continue;
    }

    // Hit detection
    let hit = false;
    let targets = [player, ...bots];
    for (let e of targets) {
      if (!e.alive || e.team === b.team) continue;
      let d = Math.hypot(b.x - e.x, b.y - e.y);
      if (d < e.radius + 3) {
        let killed = e.takeDamage(b.damage, b.team);
        if (killed && b.team === 0) {
          // Player got a kill
          kills++;
          killFeed.push({ text: 'YOU eliminated an enemy', life: 240 });
        } else if (killed && b.team !== 0) {
          // Bot got a kill
          if (e === player) {
            killFeed.push({ text: 'You were eliminated!', life: 300 });
          }
        }
        hit = true;
        break;
      }
    }

    // Hit particles
    if (hit) {
      for (let p = 0; p < 4; p++) {
        particles.push({
          x: b.x, y: b.y,
          vx: (Math.random() - 0.5) * 3,
          vy: (Math.random() - 0.5) * 3,
          life: 15, maxLife: 15, color: '#ff0', size: 2
        });
      }
      bullets.splice(i, 1);
      continue;
    }

    if (b.life <= 0) bullets.splice(i, 1);
  }

  // --- Particles ---
  for (let i = particles.length - 1; i >= 0; i--) {
    let p = particles[i];
    p.x += p.vx;
    p.y += p.vy;
    p.life--;
    if (p.life <= 0) particles.splice(i, 1);
  }

  // --- Storm ---
  stormTimer(dt);

  // --- Camera ---
  camera.x = player.x - canvas.width / 2;
  camera.y = player.y - canvas.height / 2;
  camera.x = Math.max(0, Math.min(WORLD_W - canvas.width, camera.x));
  camera.y = Math.max(0, Math.min(WORLD_H - canvas.height, camera.y));

  // --- Kill feed ---
  for (let i = killFeed.length - 1; i >= 0; i--) {
    killFeed[i].life--;
    if (killFeed[i].life <= 0) killFeed.splice(i, 1);
  }

  // --- Check game over ---
  if (!player.alive) {
    setTimeout(() => endGame(false), 1500);
    gameState = 'ending';
  } else if (aliveCount <= 1) {
    setTimeout(() => endGame(true), 800);
    gameState = 'ending';
  }

  // --- Update HUD ---
  document.getElementById('health-fill').style.width = (player.health / player.maxHealth * 100) + '%';
  document.getElementById('shield-fill').style.width = (player.shield / player.maxShield * 100) + '%';
  document.getElementById('players-alive').textContent = 'ALIVE: ' + aliveCount;
  document.getElementById('kill-count').textContent = 'KILLS: ' + kills;
  document.getElementById('weapon-info').textContent = player.weapon ? WEAPONS[player.weapon].name : 'FISTS';
}

function stormTimer(dt) {
  storm.timer -= dt;
  if (storm.shrinking) {
    let progress = 1 - (storm.timer / storm.shrinkTime);
    progress = Math.max(0, Math.min(1, progress));
    storm.radius = storm.radius + (storm.targetRadius - storm.radius) * 0.02;

    if (storm.timer <= 0) {
      storm.shrinking = false;
      storm.timer = storm.waitTime;
      storm.radius = storm.targetRadius;
    }
  } else {
    if (storm.timer <= 0 && storm.radius > 60) {
      storm.shrinking = true;
      storm.timer = storm.shrinkTime;
      storm.targetRadius = storm.radius * 0.6;
      // Random center offset within current circle
      let ang = Math.random() * Math.PI * 2;
      let offsetR = Math.random() * (storm.radius - storm.targetRadius);
      storm.x = storm.x + Math.cos(ang) * offsetR * 0.5;
      storm.y = storm.y + Math.sin(ang) * offsetR * 0.5;
    }
  }
}

// ===== RENDER =====
function render() {
  ctx.fillStyle = '#000';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  // Tiles
  let startX = Math.max(0, Math.floor(camera.x / TILE) - 1);
  let startY = Math.max(0, Math.floor(camera.y / TILE) - 1);
  let endX = Math.min(MAP_W, Math.ceil((camera.x + canvas.width) / TILE) + 1);
  let endY = Math.min(MAP_H, Math.ceil((camera.y + canvas.height) / TILE) + 1);

  for (let ty = startY; ty < endY; ty++) {
    for (let tx = startX; tx < endX; tx++) {
      drawTile(tileMap[ty][tx], tx * TILE - camera.x, ty * TILE - camera.y);
    }
  }

  // Loot
  for (let l of loots) drawLoot(l);

  // Entities
  for (let b of bots) drawEntity(b);
  drawEntity(player);

  // Bullets
  for (let b of bullets) drawBullet(b);

  // Particles
  drawParticles();

  // Storm overlay
  drawStorm();

  // Kill feed
  ctx.font = '8px "Press Start 2P"';
  ctx.textAlign = 'left';
  for (let i = 0; i < killFeed.length; i++) {
    ctx.globalAlpha = Math.min(1, killFeed[i].life / 60);
    ctx.fillStyle = '#000';
    ctx.fillRect(10, 50 + i * 16, killFeed[i].text.length * 8 + 8, 12);
    ctx.fillStyle = '#ff0';
    ctx.fillText(killFeed[i].text, 14, 59 + i * 16);
  }
  ctx.globalAlpha = 1;

  // Minimap
  drawMinimap();

  // Storm warning
  let pdist = Math.hypot(player.x - storm.x, player.y - storm.y);
  if (pdist > storm.radius) {
    ctx.fillStyle = 'rgba(180, 50, 255, 0.3)';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.fillStyle = '#fff';
    ctx.font = '10px "Press Start 2P"';
    ctx.textAlign = 'center';
    ctx.fillText('GET TO THE ZONE!', canvas.width/2, 30);
  }

  // Phase indicator
  ctx.fillStyle = '#fff';
  ctx.font = '6px "Press Start 2P"';
  ctx.textAlign = 'left';
  let phaseText = storm.shrinking ? 'STORM SHRINKING' : 'STORM SHRINKS IN ' + Math.ceil(storm.timer/1000) + 's';
  ctx.fillText(phaseText, 10, canvas.height - 10);
}

function endGame(victory) {
  gameState = 'gameover';
  let screen = document.getElementById('gameover-screen');
  let title = document.getElementById('gameover-title');
  let stats = document.getElementById('gameover-stats');

  if (victory) {
    title.textContent = '#1 VICTORY ROYALE!';
    title.style.color = '#6d4aff';
  } else {
    title.textContent = 'ELIMINATED';
    title.style.color = '#f44';
  }

  stats.textContent = `Kills: ${kills}  |  Placement: #${aliveCount}`;
  screen.style.display = 'flex';
}

// ===== INIT GAME =====
function startGame() {
  bullets = [];
  loots = [];
  particles = [];
  killFeed = [];
  kills = 0;
  aliveCount = totalPlayers;

  generateMap();
  scatterLoot();

  // Player spawn
  let px, py;
  do {
    px = Math.random() * WORLD_W;
    py = Math.random() * WORLD_H;
  } while (isBlocking(px, py));
  player = new Entity(px, py, 0, true);

  // Bots
  bots = [];
  for (let i = 1; i < totalPlayers; i++) {
    let bx, by;
    do {
      bx = Math.random() * WORLD_W;
      by = Math.random() * WORLD_H;
    } while (isBlocking(bx, by));
    let bot = new Entity(bx, by, i + 1, false);
    // Give some bots starting weapons
    let weaponKeys = Object.keys(WEAPONS);
    if (Math.random() < 0.7) {
      bot.weapon = weaponKeys[Math.floor(Math.random() * weaponKeys.length)];
    }
    bot.color = `hsl(${Math.random()*360}, 70%, 55%)`;
    bots.push(bot);
  }

  // Reset storm
  storm = { x: WORLD_W/2, y: WORLD_H/2, radius: WORLD_W * 0.55, targetRadius: WORLD_W * 0.55, phase: 0, timer: 20000, shrinkTime: 12000, waitTime: 20000, shrinking: false };

  document.getElementById('title-screen').style.display = 'none';
  document.getElementById('gameover-screen').style.display = 'none';
  gameState = 'playing';
}

// ===== MAIN LOOP =====
function gameLoop(timestamp) {
  let dt = Math.min(50, timestamp - lastTime);
  lastTime = timestamp;

  if (gameState === 'playing' || gameState === 'ending') {
    update(dt);
    render();
  }

  requestAnimationFrame(gameLoop);
}

// ===== INPUT =====
document.addEventListener('keydown', e => {
  keys[e.key.toLowerCase()] = true;
});
document.addEventListener('keyup', e => {
  keys[e.key.toLowerCase()] = false;
});

canvas.addEventListener('mousemove', e => {
  let rect = canvas.getBoundingClientRect();
  mouseX = (e.clientX - rect.left) * (canvas.width / rect.width);
  mouseY = (e.clientY - rect.top) * (canvas.height / rect.height);
});
canvas.addEventListener('mousedown', () => mouseDown = true);
canvas.addEventListener('mouseup', () => mouseDown = false);
canvas.addEventListener('contextmenu', e => e.preventDefault());

document.getElementById('start-btn').addEventListener('click', startGame);
document.getElementById('restart-btn').addEventListener('click', startGame);

// Start loop
requestAnimationFrame(gameLoop);
</script>
